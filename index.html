:root{
    --paper:#f4f1ea;        /* warm paper */
    --paper-2:#ebe7dd;
    --ink:#181613;          /* near-black ink */
    --ink-soft:#5a554c;
    --line:#d8d2c4;
    --clay:#b8543a;         /* accent: warm clay */
    --clay-soft:#c97a63;
    --card-bg:#fbfaf6;
    --surface:#fbfaf6;
    --ok:#3c6e58;
    --shadow:0 1px 2px rgba(24,22,19,.06),0 12px 36px -12px rgba(24,22,19,.22);
    --serif:'Newsreader',serif;
    --sans:'Pretendard',-apple-system,system-ui,sans-serif;
    --card-ink:#181613;     /* 카드 앞면 글자(자동 대비) */
    --card-soft:#5a554c;
    --back-bg:#181613;      /* 카드 뒷면 배경 */
    --back-ink:#f4f1ea;
    --band-ink:#ffffff;     /* 밴드 레이아웃 글자 */
    --utile:'utile-display','Hanken Grotesk',sans-serif;  /* AI 원본 폰트 임베드 */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);background:var(--paper);color:var(--ink);
    -webkit-font-smoothing:antialiased;line-height:1.5;
    background-image:radial-gradient(circle at 1px 1px,rgba(24,22,19,.035) 1px,transparent 0);
    background-size:22px 22px;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  /* ---------- top bar ---------- */
  .topbar{position:sticky;top:0;z-index:40;backdrop-filter:blur(8px);
    background:rgba(244,241,234,.82);border-bottom:1px solid var(--line)}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.02em;font-size:16px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--clay)}
  .nav{display:flex;gap:4px;background:var(--paper-2);padding:4px;border-radius:999px;border:1px solid var(--line)}
  .nav button{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink-soft);
    background:transparent;border:0;padding:7px 16px;border-radius:999px;cursor:pointer;transition:.18s}
  .nav button.active{background:var(--ink);color:var(--paper)}
  /* ---------- generic ---------- */
  .screen{min-height:calc(100vh - 60px);padding:48px 0 96px;animation:fade .5s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--clay);font-weight:700;margin-bottom:14px}
  h1.title{font-family:var(--sans);font-weight:500;font-size:clamp(34px,6vw,58px);line-height:1.04;letter-spacing:-.01em}
  h1.title em{font-style:italic;color:var(--clay)}
  .sub{color:var(--ink-soft);font-size:16px;margin-top:18px;max-width:520px}
  .btn{font-family:var(--sans);font-weight:600;font-size:15px;border:0;border-radius:12px;padding:14px 26px;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:9px}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--ink)}
  .btn-clay{background:var(--clay);color:#fff}
  .btn-clay:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
  /* ---------- steps ---------- */
  .stepbar{display:flex;gap:8px;margin-bottom:40px}
  .stepbar .seg{flex:1;height:4px;border-radius:4px;background:var(--line);overflow:hidden}
  .stepbar .seg.done{background:var(--clay)}
  .stepbar .seg.cur::after{content:"";display:block;height:100%;width:40%;background:var(--clay);animation:grow 1.2s ease infinite alternate}
  @keyframes grow{to{width:90%}}
  .grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:start}
  @media(max-width:840px){.grid2{grid-template-columns:1fr}}
  .field{margin-bottom:22px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:8px}
  .field label .req{color:var(--clay)}
  .field .hint{font-size:12px;color:var(--ink-soft);font-weight:400;margin-left:6px}
  .field input,.field select{width:100%;font-family:var(--sans);font-size:15px;padding:13px 14px;border:1px solid var(--line);border-radius:11px;background:var(--surface);color:var(--ink);transition:.15s}
  .field input:focus,.field select:focus{outline:0;border-color:var(--ink);box-shadow:0 0 0 3px rgba(24,22,19,.08)}
  .field input[readonly]{background:var(--paper-2);color:var(--ink-soft)}
  .auto-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--ok);background:rgba(60,110,88,.1);padding:3px 9px;border-radius:999px;margin-left:8px;vertical-align:middle}
  .choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .choice-grid .choice-wide{grid-column:1/-1}
  .choice{border:1px solid var(--line);background:var(--surface);border-radius:14px;padding:20px;cursor:pointer;transition:.18s;text-align:left}
  .choice:hover{border-color:var(--ink-soft)}
  .choice.sel{border-color:var(--clay);box-shadow:0 0 0 2px var(--clay) inset;background:#fff}
  .choice .ic{font-size:22px}
  .choice .nm{font-weight:700;margin-top:10px}
  .choice .ds{font-size:13px;color:var(--ink-soft);margin-top:3px}
  /* ---------- card preview ---------- */
  .preview-wrap{position:sticky;top:90px}
  .preview-label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between}
  .card-stage{perspective:1400px}
  .bizcard{width:100%;aspect-ratio:94/54;border-radius:10px;box-shadow:var(--shadow);position:relative;overflow:hidden;background:var(--card-bg);transition:.4s;container-type:inline-size}
  /* ===== DEAR.CUS 브랜드 템플릿 (앞면=정보면 / 뒷면=로고면, AI 좌표 기반) ===== */
  .pc.dcb{background:var(--back-bg);color:var(--back-ink)}
  /* 뒷면(로고면): 통째 벡터 SVG 오버레이로 처리 */
  .dc-logoside{height:100%}
  /* 정보면(앞면): SVG 푸터(로고/태그/QR) + 절대배치 동적 텍스트(이름/팀/연락처) */
  .dc-infoside{height:100%;color:#ffffff}
  /* 카드 전체 덮는 고정 아트워크(SVG) — 뒷면은 전체, 앞면은 하단 푸터 */
  .dc-fixed-svg{position:absolute;inset:0;width:100%;height:100%;display:block;pointer-events:none}
  /* === 정보면 동적 오버레이 (AI 원본 좌표를 cqw로 환산) === */
  .dci-rule{position:absolute;left:6.13cqw;right:6.13cqw;height:1px;border:0;margin:0;background:#ffffff;opacity:1;z-index:1}
  .dci-text{position:absolute;line-height:1;z-index:1;white-space:nowrap}
  .dci-nameko {top:9.75cqw;left:6.13cqw;font-family:var(--sans); font-weight:700;font-size:3.00cqw;color:#ffffff}
  .dci-teamko {top:13.87cqw;left:6.13cqw;font-family:var(--sans);font-weight:300;font-size:2.06cqw;color:#ffffff;opacity:1}
  .dci-nameen {top:9.56cqw;left:27.85cqw;font-family:var(--utile);font-weight:500;font-size:3.00cqw;color:#ffffff}
  .dci-titleen{top:13.51cqw;left:27.85cqw;font-family:var(--utile);font-weight:400;font-size:2.44cqw;color:#ffffff;opacity:1}
  .dci-lbl    {left:6.13cqw;font-family:var(--utile);font-weight:400;font-size:2.44cqw}
  .dci-val    {left:27.85cqw;font-family:var(--utile);font-weight:400;font-size:2.44cqw}
  .dci-tel    {top:22.90cqw}
  .dci-em     {top:26.94cqw}
  .dci-ad     {top:30.97cqw}
  .dci-ad-l2  {top:34.16cqw;left:27.85cqw;font-family:var(--utile);font-weight:400;font-size:2.44cqw}
  .dci-addrko {top:38.05cqw;left:27.77cqw;font-family:var(--sans);font-weight:300;font-size:2.06cqw;color:#ffffff;opacity:1}
  .flip-row{display:flex;flex-direction:column;gap:16px}
  .flip-btn{align-self:center;font-size:13px;color:var(--ink-soft);background:none;border:0;cursor:pointer;font-weight:600;font-family:var(--sans);display:flex;align-items:center;gap:6px}
  /* the actual print card markup (also used for capture) */
  .pc{position:relative;width:100%;height:100%;font-family:var(--sans);color:var(--card-ink);background:var(--card-bg)}
  .pc-front{padding:11% 12%;display:flex;flex-direction:column;justify-content:space-between}
  .pc-front.lay-center{justify-content:center;align-items:center;text-align:center;gap:5%}
  .pc-front.lay-band{padding:0;justify-content:flex-start}
  .pc-rule{position:absolute;left:0;top:0;height:100%;width:6px;background:var(--clay)}
  .pc-name{font-family:var(--serif),var(--sans);font-size:clamp(18px,4.4vw,30px);font-weight:700;letter-spacing:-.02em;line-height:1.05}
  .pc-en{font-family:var(--serif),var(--sans);font-size:clamp(11px,2vw,14px);color:var(--card-soft);margin-top:6px;letter-spacing:.04em}

/* =========================================================================
   명함 제작 자동화 시스템  (원티드 명함 만들기 플로우 재현)
   - 단일 파일 / 디자인툴·서버 불필요 / 브라우저에서 인쇄용 PDF 생성
   - 데이터 영속: window.storage (Claude 아티팩트). 미지원시 메모리 폴백.
   ========================================================================= */

/* ---------- 0. 영속 저장 래퍼 ---------- */
const mem = new Map();
const hasArtifact  = (typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');
const hasLocal     = (()=>{ try{ if(typeof localStorage==='undefined') return false; localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; }catch(e){ return false; } })();
const hasStore     = hasArtifact || hasLocal;   // 영속 저장 가능 여부(관리자 UI 표시용)
const LS_PREFIX    = 'cardsystem:';
const store = {
  async get(k){
    try{ if(hasArtifact){const r=await window.storage.get(k,true); if(r) return JSON.parse(r.value);} }catch(e){}
    if(hasLocal){ try{ const v=localStorage.getItem(LS_PREFIX+k); if(v) return JSON.parse(v); }catch(e){} }
    return mem.has(k)?JSON.parse(mem.get(k)):null;
  },
  async set(k,v){
    const s=JSON.stringify(v); mem.set(k,s);
    if(hasLocal){ try{ localStorage.setItem(LS_PREFIX+k,s); }catch(e){} }
    try{ if(hasArtifact) await window.storage.set(k,s,true); }catch(e){}
  },
  async del(k){
    mem.delete(k);
    if(hasLocal){ try{ localStorage.removeItem(LS_PREFIX+k); }catch(e){} }
    try{ if(hasArtifact) await window.storage.delete(k,true); }catch(e){}
  },
  async list(prefix){
    const out=[], seen=new Set();
    try{ if(hasArtifact){const r=await window.storage.list(prefix,true); if(r&&r.keys){for(const key of r.keys){const v=await this.get(key); if(v){out.push(v); seen.add(key);}}} } }catch(e){}
    if(hasLocal){
      try{
        for(let i=0;i<localStorage.length;i++){
          const fk=localStorage.key(i);
          if(!fk||!fk.startsWith(LS_PREFIX)) continue;
          const k=fk.slice(LS_PREFIX.length);
          if(k.startsWith(prefix) && !seen.has(k)){
            const v=JSON.parse(localStorage.getItem(fk)); if(v){ out.push(v); seen.add(k); }
          }
        }
      }catch(e){}
    }
    for(const [k] of mem){
      if(k.startsWith(prefix) && !seen.has(k)){
        const v=JSON.parse(mem.get(k)); if(v){ out.push(v); seen.add(k); }
      }
    }
    return out;
  }
};

/* ============================ BACKEND (Apps Script + Sheets + Drive) ============================
 * 신청 데이터는 구글 시트로, 생성된 PDF는 드라이브 월별 폴더로 아카이브됩니다.

 *   SHEET_URL       : 관리자가 열 시트 URL (관리자 탭의 '시트 열기' 버튼에 연결)
 */
const API_URL         = 'https://script.google.com/macros/s/AKfycbwg1rQ4OFrOiL710mhAmLTiWOWHblzdZwZkxpzcmaNM2V12Zfwz-Uv0es-9clK_GKJ8tA/exec';
try{ console.log('%c[DEAR.CUS] 빌드확인 — API_URL 끝부분: '+API_URL.slice(-22), 'color:#043931;font-weight:bold'); }catch(e){}
const OAUTH_CLIENT_ID = '257561913417-qs022h85jaefab5uvruddn63ca8dbh9f.apps.googleusercontent.com';
const ALLOWED_DOMAIN  = 'dearcus.com';
const SHEET_URL       = 'https://docs.google.com/spreadsheets/d/1K-enU0PaO9cKiPkI9cZzJ_0-0PefBmloffUK7fMBsCY/edit';

let _idToken=null, _identity=null;
const isConfigured = ()=>!String(API_URL).startsWith('__') && !String(OAUTH_CLIENT_ID).startsWith('__');

function _parseJwt(t){ try{ return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }catch(e){ return null; } }
function _tokenLive(t){ const p=_parseJwt(t); return !!(p && p.exp*1000 > Date.now()+30000); }

async function signInWithGoogle(){
  if(_idToken && _tokenLive(_idToken)) return _idToken;
  if(typeof google==='undefined' || !google.accounts || !google.accounts.id)
    throw new Error('Google 로그인 라이브러리가 아직 로드되지 않았습니다. 잠시 후 다시 시도해 주세요.');
  return new Promise((resolve,reject)=>{
    google.accounts.id.initialize({
      client_id: OAUTH_CLIENT_ID,
      callback: (resp)=>{
        const tok=resp.credential, claims=_parseJwt(tok);
        if(!claims){ reject(new Error('토큰 파싱 실패')); return; }
        if(claims.hd!==ALLOWED_DOMAIN){
          reject(new Error(`사내 계정(@${ALLOWED_DOMAIN})으로 로그인해 주세요.\n로그인된 계정: ${claims.email||'?'}`));
          return;
        }
        _idToken=tok; _identity=claims; resolve(tok);
      },
      auto_select:false, cancel_on_tap_outside:false, hosted_domain: ALLOWED_DOMAIN
    });
    google.accounts.id.prompt(notification=>{
      if(notification && notification.isNotDisplayed && (notification.isNotDisplayed() || notification.isSkippedMoment())){
        reject(new Error('Google 로그인 창을 열 수 없습니다. 브라우저의 서드파티 쿠키 차단을 해제하거나 Google 계정에 먼저 로그인 후 다시 시도해 주세요.'));
      }
    });
  });
}

function _blobToBase64(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(String(r.result).split(',')[1]);
    r.onerror=()=>rej(r.error);
    r.readAsDataURL(blob);
  });
}

async function submitToBackend(application, pdfBlob){
  if(!API_URL || String(API_URL).startsWith('__')) return null;
  // "모든 사용자" 권한이라 fetch POST + PDF 전송 가능 (CORS OK)
  const pdfBase64 = pdfBlob ? await _blobToBase64(pdfBlob) : '';
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},  // simple request — no preflight
    body: JSON.stringify({ application, pdfBase64 }),
    redirect:'follow'
  });
  const d = await r.json();
  if(!d || !d.ok) throw new Error('서버 응답 실패: ' + (d && d.error || 'unknown'));
  return d;
}

/* ---------- 1. 한글 -> 로마자 자동 변환 ----------
   유니코드 한글 음절 분해 + 국립국어원 표준 로마자 표기 + 관용 표기 오버라이드 */
const CHO=['g','kk','n','d','tt','r','m','b','pp','s','ss','','j','jj','ch','k','t','p','h'];
const JUNG=['a','ae','ya','yae','eo','e','yeo','ye','o','wa','wae','oe','yo','u','wo','we','wi','yu','eu','ui','i'];
const JONG=['','k','k','k','n','n','n','t','l','k','m','l','l','l','p','l','m','p','p','t','t','ng','t','t','k','t','p','t'];
const SUR={'김':'Kim','이':'Lee','박':'Park','최':'Choi','정':'Jeong','강':'Kang','조':'Cho','윤':'Yoon','장':'Jang','임':'Lim','한':'Han','오':'Oh','서':'Seo','신':'Shin','권':'Kwon','황':'Hwang','안':'Ahn','송':'Song','전':'Jeon','홍':'Hong','유':'Yoo','고':'Ko','문':'Moon','양':'Yang','손':'Son','배':'Bae','백':'Baek','허':'Heo','남':'Nam','심':'Shim','노':'Noh','하':'Ha','곽':'Kwak','성':'Sung','차':'Cha','주':'Joo','우':'Woo','구':'Koo','류':'Ryu','민':'Min','나':'Na','진':'Jin','지':'Ji','엄':'Eom','채':'Chae','원':'Won','천':'Cheon','방':'Bang','공':'Kong','현':'Hyun','함':'Ham','변':'Byun','염':'Yeom','여':'Yeo','추':'Chu','도':'Do','소':'So','석':'Seok','선':'Sun','설':'Seol','마':'Ma','길':'Gil','연':'Yeon','위':'Wi','표':'Pyo','명':'Myung','기':'Ki','반':'Ban','왕':'Wang','금':'Keum','옥':'Ok','육':'Yook','인':'In','맹':'Maeng','제':'Je','모':'Mo','탁':'Tak','국':'Kook','어':'Eo','은':'Eun','편':'Pyeon','용':'Yong','예':'Ye','봉':'Bong','사':'Sa','부':'Boo'};
const DSUR={'남궁':'Namgung','황보':'Hwangbo','제갈':'Jegal','선우':'Sunwoo','독고':'Dokgo','서문':'Seomun'};
function syl(ch){const c=ch.charCodeAt(0); if(c<0xAC00||c>0xD7A3)return ch; const s=c-0xAC00; return CHO[Math.floor(s/588)]+JUNG[Math.floor((s%588)/28)]+JONG[s%28];}
function givenRom(s){const o=[...s].map(syl).join(''); return o.charAt(0).toUpperCase()+o.slice(1);}
function romanize(name){
  name=(name||'').trim(); if(!name)return '';
  if(name.length>=3 && DSUR[name.slice(0,2)]) return DSUR[name.slice(0,2)]+' '+givenRom(name.slice(2));
  if(SUR[name[0]]) return SUR[name[0]]+' '+givenRom(name.slice(1));
  return givenRom(name[0])+' '+givenRom(name.slice(1));
}

const loadedFonts=new Set(['Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300']);
function loadFont(g){ if(!g||loadedFonts.has(g))return; loadedFonts.add(g);

function fontStack(group,key){ const f=FONTS[group].find(x=>x.key===key)||FONTS[group][0]; loadFont(f.google); return f.stack; }
function hexToRgb(h){h=String(h||'#000').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');const n=parseInt(h||'0',16);return[(n>>16)&255,(n>>8)&255,n&255];}
function rgbToHex(a){return '#'+a.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
function mix(a,b,t){const A=hexToRgb(a),B=hexToRgb(b);return rgbToHex([0,1,2].map(i=>A[i]+(B[i]-A[i])*t));}
function lum(h){const v=hexToRgb(h).map(x=>{x/=255;return x<=0.03928?x/12.92:Math.pow((x+0.055)/1.055,2.4);});return 0.2126*v[0]+0.7152*v[1]+0.0722*v[2];}
function idealInk(bg,dark,light){return lum(bg)>0.52?(dark||'#181613'):(light||'#f4f1ea');}
function applyTheme(){
  const d=CONFIG.design||{}, r=document.documentElement.style;
  r.setProperty('--sans',fontStack('body',d.fontBody));
  r.setProperty('--serif',fontStack('display',d.fontDisplay));
  r.setProperty('--clay',d.accent); r.setProperty('--clay-soft',mix(d.accent,d.paper,0.35));
  r.setProperty('--ink',d.ink); r.setProperty('--ink-soft',mix(d.ink,d.paper,0.4));
  r.setProperty('--paper',d.paper); r.setProperty('--paper-2',mix(d.paper,d.ink,0.06)); r.setProperty('--line',mix(d.paper,d.ink,0.16));
  r.setProperty('--surface', d.surface || mix(d.paper,'#ffffff',0.45));
  r.setProperty('--card-bg',d.cardBg);
  const cInk=idealInk(d.cardBg,d.ink,d.paper);
  r.setProperty('--card-ink',cInk); r.setProperty('--card-soft',mix(cInk,d.cardBg,0.42));
  r.setProperty('--back-bg',d.backBg); r.setProperty('--back-ink',idealInk(d.backBg,d.ink,d.paper));
  r.setProperty('--band-ink',idealInk(d.accent,'#181613','#ffffff'));
  applyUtile(d.utileUrl);
}
/* Utile Display: 웹폰트 URL이 있으면 로드, 없으면 Hanken Grotesk로 폴백 */
let _utileUrl=null;
function applyUtile(url){
  const r=document.documentElement.style;
  let st=document.getElementById('utile-face');
  if(url){
    // 관리자가 직접 폰트 파일 URL을 넣은 경우 우선 적용 (Typekit과 병행 가능)
    if(_utileUrl!==url){ _utileUrl=url;
      if(!st){ st=document.createElement('style'); st.id='utile-face'; document.head.appendChild(st); }
      st.textContent=`@font-face{font-family:'UtileDisplayCustom';src:url(${url}) format('woff2'),url(${url}) format('opentype');font-display:swap;font-weight:400 700}`;
    }
    r.setProperty('--utile',"'UtileDisplayCustom','utile-display','Hanken Grotesk',var(--sans)");
  } else {
    // 기본: Typekit으로 로드되는 utile-display 사용 (head의 <link> 태그가 공급)
    if(st) st.textContent='';
    _utileUrl=null;
    r.setProperty('--utile',"'utile-display','Hanken Grotesk',var(--sans)");
  }
}

/* QR 생성: 텍스트 -> dataURL (qrcodejs) */
function makeQR(text,colorDark,colorLight){
  return new Promise(res=>{ try{
    const tmp=document.createElement('div'); tmp.style.cssText='position:fixed;left:-99999px;top:0';
    document.body.appendChild(tmp);
    new QRCode(tmp,{text:text||'https://example.com',width:240,height:240,colorDark:colorDark,colorLight:colorLight,correctLevel:QRCode.CorrectLevel.M});
    setTimeout(()=>{ const c=tmp.querySelector('canvas'); let url='';
      if(c){ try{url=c.toDataURL('image/png');}catch(e){} }
      if(!url){ const img=tmp.querySelector('img'); url=img?img.src:''; }
      tmp.remove(); res(url); },60);
  }catch(e){ res(''); } });
}

function migrateConfig(){
  let changed = false;
  // 카드 색상(앞면 그린·뒷면 배경·페이지 배경): 저장된 색 버전이 코드보다 낮으면 → 코드 기본값으로 1회 강제 교체
  // (그동안 캐시/시트에 박힌 중간 실험값 #103933·#DFE2E0·#EEF1F4 등을 어도비 매칭 원본값으로 되돌림. 이후 관리자 수정은 보존)
  if(CONFIG._colorV !== COLOR_VERSION){
    CONFIG.design = CONFIG.design || {};
    CONFIG.design.cardBg = DEFAULT_CONFIG.design.cardBg;
    CONFIG.design.backBg = DEFAULT_CONFIG.design.backBg;
    CONFIG.design.ink    = DEFAULT_CONFIG.design.ink;
    CONFIG.design.accent = DEFAULT_CONFIG.design.accent;
    CONFIG.design.paper  = DEFAULT_CONFIG.design.paper;
    CONFIG._colorV = COLOR_VERSION;
    changed = true;
  }
  // 팀/직책 카탈로그: 저장된 버전이 코드 버전보다 낮으면 → 코드 기본값으로 1회 강제 교체
  // (캐시·시트 어느 쪽에서 온 옛 목록이든 여기서 잡힘. 교체 후 마커를 올려 이후 관리자 수정은 보존)
  if(CONFIG._catalogV !== CATALOG_VERSION){
    CONFIG.teams = JSON.parse(JSON.stringify(DEFAULT_CONFIG.teams));
    CONFIG.roles = JSON.parse(JSON.stringify(DEFAULT_CONFIG.roles));
    CONFIG._catalogV = CATALOG_VERSION;
    changed = true;
  }
  return changed;
}
async function boot(){
  // 1) 로컬 캐시로 초기 부팅 (즉시 화면)
  const saved = await store.get('config:main');
  CONFIG = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  if(saved){
    if(saved.vendorEmail) CONFIG.vendorEmail = saved.vendorEmail;
    if(saved._catalogV != null) CONFIG._catalogV = saved._catalogV;
    if(saved._colorV != null) CONFIG._colorV = saved._colorV;
    // 버전이 달라도 관리자가 저장한 설정은 유지 (기본값 위에 병합) — 색·구조 변경은 migrateConfig가 처리
    if(saved.teams) CONFIG.teams = saved.teams;
    if(saved.roles) CONFIG.roles = saved.roles;
    CONFIG.brand  = Object.assign({}, DEFAULT_CONFIG.brand,  saved.brand||{});
    CONFIG.design = Object.assign({}, DEFAULT_CONFIG.design, saved.design||{});
  }
  CONFIG._v = CONFIG_VERSION;
  if(migrateConfig()) await store.set('config:main', CONFIG);   // 로컬 즉시 마이그레이션 반영
  document.getElementById('brandName').textContent = CONFIG.brand.name || '명함 스튜디오';
  applyTheme(); await refreshBrandQR(); render();
  // 2) 시트에서 최신 설정 fetch — 있으면 덮어쓰고 다시 렌더 (백그라운드)
  fetchSheetConfigAndApply();
}
async function fetchSheetConfigAndApply(){
  try{
    if(!API_URL || String(API_URL).startsWith('__')) return;
    const r = await fetch(API_URL + '?action=config', { redirect: 'follow' });
    const d = await r.json();
    if(d && d.ok && d.config && typeof d.config === 'object'){
      const c = d.config;
      if(c.teams) CONFIG.teams = c.teams;
      if(c.roles) CONFIG.roles = c.roles;
      // 시트 config의 카탈로그 마커 반영(없으면 0=구버전 취급) → 옛 목록이면 migrateConfig가 코드 기본값으로 교체 후 시트에 재푸시
      CONFIG._catalogV = (typeof c._catalogV === 'number') ? c._catalogV : 0;
      CONFIG._colorV = (typeof c._colorV === 'number') ? c._colorV : 0;
      if(c.brand) CONFIG.brand = Object.assign({}, DEFAULT_CONFIG.brand, c.brand);
      if(c.design) CONFIG.design = Object.assign({}, DEFAULT_CONFIG.design, c.design);
      if(c.vendorEmail) CONFIG.vendorEmail = c.vendorEmail;
      const migrated = migrateConfig();
      await store.set('config:main', CONFIG);
      applyTheme(); await refreshBrandQR(); render();
      console.log('[sync] ✓ 시트에서 설정 로드');
      if(migrated){ console.log('[sync] 마이그레이션 적용 → 시트에 푸시'); pushSheetConfig(); }
    } else {
      console.log('[sync] 시트에 설정 없음(로컬 캐시 사용)');
    }
  }catch(e){ console.warn('[sync] 시트 설정 fetch 실패:', e); }
}
/* ---------- JSONP 헬퍼 (Workspace 정책 우회) ---------- */
let _jsonpN = 0;
function jsonpGet(url){
  return new Promise((resolve, reject) => {
    const cb = '_jsonp_' + (++_jsonpN) + '_' + Date.now();
    const sep = url.indexOf('?') >= 0 ? '&' : '?';
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('JSONP timeout')); }, 25000);
    function cleanup(){
      clearTimeout(timer);
      try { delete window[cb]; } catch(_) { window[cb] = undefined; }
      if(script.parentNode) script.parentNode.removeChild(script);
    }
    window[cb] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('JSONP load error')); };
    script.src = url + sep + 'callback=' + cb;
    document.head.appendChild(script);
  });
}

/* ---------- 6. 명함 캡처 (html2canvas → canvas/dataURL) ---------- */
async function captureSide(side, opts){
  opts = opts || {};
  const host=document.getElementById('capture-host');
  const W = opts.W || 1080;                                // 기본 1080px (PDF용 — 94mm @ ~1170dpi)
  const H = Math.round(W*54/94);
  const box=document.createElement('div');
  box.className='bizcard'; box.style.cssText=`width:${W}px;height:${H}px;border-radius:0;box-shadow:none`;
  box.innerHTML = side==='back'?cardBackHTML(state.app):cardFrontHTML(state.app);
  host.innerHTML=''; host.appendChild(box);
  if(document.fonts && document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }
  await new Promise(r=>setTimeout(r,80));
  const canvas=await html2canvas(box,{
    scale: opts.scale || 4,
    backgroundColor:(side==='back'?CONFIG.design.backBg:CONFIG.design.cardBg)||'#ffffff',
    logging:false, useCORS:true, imageTimeout: 0
  });
  host.innerHTML='';
  if(opts.canvas) return canvas;
  return canvas.toDataURL(opts.format || 'image/png');
}
// 94x54mm 2면 PDF (front + back) — 인쇄용 적정 해상도 (~580dpi, ~500KB-1MB)
async function buildPDF(app, returnBlob){
  // 1순위: 벡터+CMYK (svg2pdf). 실패하면 아래 래스터로 자동 폴백.
  try{
    if(window.buildVectorDoc){
      const vdoc = await window.buildVectorDoc(app);
      if(returnBlob) return vdoc.output('blob');
      return vdoc;
    }
  }catch(e){ console.warn('[vector] 벡터 생성 실패 → 래스터 폴백:', e); }
  const prev=state.app; state.app=app;
  const cf=await captureSide('front', {W: 540, scale: 4, canvas: true});  // 2160px @94mm ≈ 583dpi
  const cb=await captureSide('back',  {W: 540, scale: 4, canvas: true});
  state.app=prev;
  const fPng = cf.toDataURL('image/png');
  const bPng = cb.toDataURL('image/png');
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:[94,54]});
  doc.addImage(fPng,'PNG',0,0,94,54,undefined,'FAST');
  if((app.type||'양면')==='양면'){ doc.addPage([94,54],'landscape'); doc.addImage(bPng,'PNG',0,0,94,54,undefined,'FAST'); }
  if(returnBlob) return doc.output('blob');
  return doc;
}
// 앞면만 JPG, 50% 축소 (출력 담당자가 빠르게 확인용)
async function buildJPG(app){
  const prev=state.app; state.app=app;
  const canvas=await captureSide('front', {W: 540, scale: 4, canvas: true});  // 2160px ≈ 580dpi
  state.app=prev;
  return new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.92));
}
function triggerDownload(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url); a.remove();}, 200);
}
function safeFile(app){ const en=(app.nameEn||app.nameKo||'card').replace(/\s+/g,'_'); return `명함_${app.nameKo||''}_${en}`.replace(/[\\/:*?"<>|]/g,''); }

function bindInfo(){

  en.addEventListener('input',()=>{
    // 첫글자 자동 대문자 (커서 위치 유지)
    const pos=en.selectionStart, raw=en.value;
    const fixed=raw.length ? raw.charAt(0).toUpperCase()+raw.slice(1) : raw;
    if(fixed!==raw){ en.value=fixed; try{ en.setSelectionRange(pos,pos); }catch(e){} }
    a.nameEn=fixed;
    // 이메일 자동 입력 (사용자가 직접 수정한 적 없을 때만)

    }

  });
  team.addEventListener('change',()=>{ a.team=team.value; refreshLive(); validateInfo(); });

  return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7); }

function row(k,v){return `<div class="row"><span class="k">${k}</span><span class="v">${esc(v)}</span></div>`;}
async function bindReview(){
  state.side='front';
  state.capFront=await captureSide('front');
  state.capBack=await captureSide('back');
  setReviewImg();
  const card=document.getElementById('magcard'), lens=document.getElementById('lens'), img=document.getElementById('magimg');
  const ZOOM=2.4;
  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect(); const x=e.clientX-r.left, y=e.clientY-r.top;
    if(x<0||y<0||x>r.width||y>r.height){lens.style.display='none';return;}
    lens.style.display='block';
    const lw=lens.offsetWidth/2, lh=lens.offsetHeight/2;
    lens.style.left=(x-lw)+'px'; lens.style.top=(y-lh)+'px';
    lens.style.backgroundImage=`url(${state.side==='back'?state.capBack:state.capFront})`;
    lens.style.backgroundSize=(r.width*ZOOM)+'px '+(r.height*ZOOM)+'px';
    lens.style.backgroundPosition=`-${x*ZOOM-lw}px -${y*ZOOM-lh}px`;
  });
  card.addEventListener('mouseleave',()=>lens.style.display='none');
}
function setReviewImg(){ const img=document.getElementById('magimg');
  if(img){ img.src=state.side==='back'?state.capBack:state.capFront; }

async function submitApp(){
  const btn=document.getElementById('submitBtn'); if(btn){btn.disabled=true;btn.textContent='JPG 생성 중…';}
  const a=Object.assign({},state.app);
  const id='card_'+Date.now();
  const now=new Date();
  const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const rec=Object.assign({id,ym,createdAt:now.toISOString(),status:'신청'},a);
  try{
    // 1) 출력 담당자용 JPG(앞면, 50%) 자동 다운로드
    const jpgBlob=await buildJPG(rec);
    const filename=safeFile(rec)+'_앞면.jpg';
    triggerDownload(jpgBlob, filename);
    rec.fileName=filename;
    // 2) 로컬 캐시
    await store.set('applications:'+id, rec);
    state._lastId=id; state._lastFileName=filename;
    state.step=4; render();
    // 3) 백엔드(시트+드라이브) 비동기 동기화 — 실패해도 사용자 흐름엔 영향 X
    (async()=>{
      try{
        if(btn) btn.textContent='시트+드라이브 동기화 중…';
        const pdfBlob = await buildPDF(rec, true);     // 양면 PDF (Drive 아카이브용)
        const result = await submitToBackend(rec, pdfBlob);
        if(result && result.fileUrl){
          rec.fileUrl = result.fileUrl;
          rec.folderUrl = result.folderUrl;
          await store.set('applications:'+id, rec);
        }
        console.log('[sync] ✓ 시트+드라이브 동기화 완료', result);
      }catch(e){ console.warn('[sync] 시트/드라이브 동기화 실패:', e); }
    })();
  }catch(err){
    if(btn){btn.disabled=false;btn.textContent='이대로 신청 완료 →';}
    alert('JPG 생성 실패: '+(err && err.message || err));
  }
}

// downloadPDF/JPG: 로컬 캐시 우선, 없으면 시트 캐시(_sheetRecs)에서 찾기
async function _getRec(id){

  return (await store.get('applications:'+id)) || state.app;

function stat(n,l){return `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`;}
// 삭제: ① 로컬 즉시 숨김(이 브라우저, 백엔드 없어도 바로 사라짐) + ② 시트 행 삭제(전역)
function rowOf(r){ var m=String(r&&r.id||'').match(/^sheet_(\d+)$/); return m?+m[1]:null; }
async function deleteFromBackend(rows){
  if(!API_URL || String(API_URL).startsWith('__')) return {ok:false};
  try{
    const url = API_URL + '?action=delete&rows=' + encodeURIComponent(JSON.stringify(rows)) + '&_=' + Date.now();
    console.log('[sync] 삭제 요청 →', url);
    const res = await fetch(url, {redirect:'follow'});
    try{ const d = await res.json(); console.log('[sync] 삭제 결과:', d); return d; }catch(_){ return {ok:true}; }
  }catch(e){ console.warn('[sync] 시트 삭제 실패:', e); return {ok:false}; }
}
async function delRec(i){
  const r=(window._adminRecs||[])[i]; if(!r) return;
  if(!confirm('이 신청 기록을 삭제할까요?')) return;
  const row=rowOf(r);
  toast('삭제 중…');
  if(row) await deleteFromBackend([row]);
  renderAdmin();
}
async function delSelected(){
  const idx=[...document.querySelectorAll('.dashsel:checked')].map(c=>+c.value);
  if(!idx.length){ toast('선택된 항목이 없습니다'); return; }
  if(!confirm(idx.length+'건을 삭제할까요?')) return;
  const recs=window._adminRecs||[], rows=[];
  for(const i of idx){ const row=rowOf(recs[i]); if(row)rows.push(row); }
  toast('삭제 중…');
  if(rows.length) await deleteFromBackend(rows);
  renderAdmin();
}
async function exportCSV(){
  const recs=(await store.list('applications:')).sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
  const head=['신청일','국문이름','영문이름','팀','직책','사유','타입','휴대전화','이메일','내선','상태'];
  const rows=recs.map(r=>[r.createdAt.slice(0,10),r.nameKo,r.nameEn,r.team,r.role,r.reason,r.type,r.mobile,r.email||'',r.ext||'',r.status]);
  const csv='\uFEFF'+[head,...rows].map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  const a=document.createElement('a'); a.href=url; a.download='명함신청_아카이브.csv'; a.click(); URL.revokeObjectURL(url);
  toast('CSV를 내보냈습니다');
}

async function batchPDF(){
  const recs=selectedPrintRecs(); if(!recs.length){ toast('선택된 항목이 없습니다'); return; }
  if(!(window.dcVectorReady && window.dcVectorReady())){ toast('PDF 엔진 로딩 중… 잠시 후 다시 시도해 주세요'); return; }
  toast(`${recs.length}건 통합 PDF 생성 중…`);
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'mm',format:[94,54],compress:false});
    let first=true;
    for(const r of recs){ if(!first) doc.addPage([94,54],'landscape'); await window.addVectorCard(doc, r); first=false; }
    window.dcCmykPatch(doc);
    doc.save('명함_통합인쇄_'+(document.getElementById('prMonth')?.value||'')+'.pdf');
    toast(`통합 PDF 생성 완료 (${recs.length}건)`);
  }catch(e){ console.error('통합 PDF 실패:', e); toast('통합 PDF 생성 실패 — 콘솔(F12)을 확인해 주세요'); }
}
async function vendorMail(){

  const body=`받는사람: ${CONFIG.vendorEmail}\n제목: ${subj}\n\n안녕하세요, ${CONFIG.brand.name} 경영관리팀입니다.\n\n${m} 명함 인쇄 발주 요청드립니다. (총 ${recs.length}건)\n\n${lines}\n\n· 규격: 90 x 50mm (재단 기준)\n· 인쇄용 통합 PDF를 본 메일에 첨부합니다.\n\n감사합니다.`;

  }
}

    if(!API_URL || String(API_URL).startsWith('__')){ console.warn('[sync] API_URL 미설정 — push 건너뜀'); return; }
    console.log('[sync] 시트로 설정 push 중...');
    const r = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'config', config: CONFIG }),
      redirect:'follow'
    });
    const d = await r.json();
    if(d && d.ok){ console.log('[sync] ✓ 시트 설정 저장 완료'); }
    else { console.error('[sync] push 응답 실패:', d); }
  }catch(e){ console.error('[sync] push 예외:', e); }
}
async function resetConfig(){ CONFIG=JSON.parse(JSON.stringify(DEFAULT_CONFIG)); await store.set('config:main',CONFIG);

boot();

      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 266.46 153.07" width="266.46" height="153.07">'+els.join("")+inner+'</svg>';
    });
  }
  function backSVG(){
    var bs = (CONFIG.brand.backFixed||window.BACK_SVG||"");
    var bg=((CONFIG.design&&CONFIG.design.backBg)||"#E7E9E7"), gr=((CONFIG.design&&CONFIG.design.cardBg)||"#043931");
    bs = bs.replace(/<style[\s\S]*?<\/style>/g,"")
           .replace(/width="100%"/,'').replace(/height="100%"/,'')
           .replace(/<svg /,'<svg width="266.46" height="153.07" ')
           .replace(/class="st0"/g,'fill="'+bg+'"')
           .replace(/class="st1"/g,'fill="'+gr+'"')
           .replace(/class="[^"]*"/g,"");
    return bs;
  }
  function svgEl(str){ var d=new DOMParser().parseFromString(str,"image/svg+xml"); return d.documentElement; }
  function getSvgFn(doc){
    if(window.svg2pdf && typeof window.svg2pdf.svg2pdf==="function") return window.svg2pdf.svg2pdf;
    if(typeof window.svg2pdf==="function") return window.svg2pdf;
    if(doc && typeof doc.svg==="function") return function(el,d,opt){ return d.svg(el,opt); };
    return null;
  }
  function renderSVG(doc, str){
    var el = svgEl(str); el.setAttribute("style","position:absolute;left:-99999px;top:0"); document.body.appendChild(el);
    var fn = getSvgFn(doc);
    if(!fn){ try{el.remove();}catch(e){} return Promise.reject(new Error("svg2pdf missing")); }
    return Promise.resolve(fn(el, doc, {x:0,y:0,width:94,height:54})).then(function(){ try{el.remove();}catch(e){} });
  }
  // 생성된 PDF 콘텐츠 스트림의 RGB 칠 → CMYK 치환 (딥그린/배경/흰색)
  function cmykPatch(doc){
    var map=[[[0.0157,0.2235,0.1922],[0.84,0.49,0.66,0.61]],
             [[0.9059,0.9137,0.9059],[0.12,0.07,0.09,0]],
             [[1,1,1],[0,0,0,0]]];
    function near(r,g,b){ var best=map[0],bd=1e9; for(var i=0;i<map.length;i++){var m=map[i],d=Math.pow(m[0][0]-r,2)+Math.pow(m[0][1]-g,2)+Math.pow(m[0][2]-b,2); if(d<bd){bd=d;best=m;}} return best[1]; }
    function fix(s){ return s.replace(/([0-9]*\.?[0-9]+) ([0-9]*\.?[0-9]+) ([0-9]*\.?[0-9]+) (rg|RG)\b/g,function(mm,r,g,b,op){ var c=near(parseFloat(r),parseFloat(g),parseFloat(b)); return c[0]+" "+c[1]+" "+c[2]+" "+c[3]+" "+(op==="rg"?"k":"K"); }); }
    var pages = doc.internal && doc.internal.pages;
    if(!pages) return;
    for(var i=1;i<pages.length;i++){
      var pg=pages[i]; if(!pg) continue;
      if(Array.isArray(pg)){ pages[i]=pg.map(fix); }
      else if(typeof pg==="string"){ pages[i]=fix(pg); }
    }
  }
  // 메인: 벡터+CMYK jsPDF doc 생성
  window.buildVectorDoc = function(a){
    var jsPDF = (window.jspdf||{}).jsPDF;
    if(!jsPDF || !window.opentype) return Promise.reject(new Error("libs missing (opentype/jspdf)"));
    var hasSvg = (window.svg2pdf && typeof window.svg2pdf.svg2pdf==="function") || (typeof window.svg2pdf==="function") || (jsPDF.API && typeof jsPDF.API.svg==="function");
    if(!hasSvg) return Promise.reject(new Error("svg2pdf missing"));
    var doc = new jsPDF({orientation:"landscape",unit:"mm",format:[94,54],compress:false});
    return frontSVG(a).then(function(fs){ return renderSVG(doc, fs); }).then(function(){
      if((a.type||"양면")==="양면"){ doc.addPage([94,54],"landscape"); return renderSVG(doc, backSVG()); }
    }).then(function(){ cmykPatch(doc); return doc; });
  };
  // 통합(여러 명) 인쇄용: 한 doc에 카드 페이지를 이어붙임
  window.addVectorCard = function(doc, a){
    return frontSVG(a).then(function(fs){ return renderSVG(doc, fs); }).then(function(){
      if((a.type||"양면")==="양면"){ doc.addPage([94,54],"landscape"); return renderSVG(doc, backSVG()); }
    });
  };
  window.dcCmykPatch = function(doc){ try{ cmykPatch(doc); }catch(e){} };
  window.dcVectorReady = function(){
    var jsPDF=(window.jspdf||{}).jsPDF;
    return !!(jsPDF && window.opentype && ((window.svg2pdf&&typeof window.svg2pdf.svg2pdf==="function")||typeof window.svg2pdf==="function"||(jsPDF.API&&typeof jsPDF.API.svg==="function")));
  };
  // 진단: 콘솔에서 dcVectorTest() 실행 → 성공 시 PDF 저장, 실패 시 정확한 에러 출력
  window.dcVectorTest = function(){
    try{
      console.log("opentype:", !!window.opentype,
                  "| jspdf:", !!(window.jspdf&&window.jspdf.jsPDF),
                  "| svg2pdf.svg2pdf:", !!(window.svg2pdf&&typeof window.svg2pdf.svg2pdf==="function"),
                  "| svg2pdf(typeof):", typeof window.svg2pdf,
                  "| API.svg:", !!(window.jspdf&&window.jspdf.jsPDF&&window.jspdf.jsPDF.API&&typeof window.jspdf.jsPDF.API.svg==="function"));
    }catch(e){ console.error("환경 체크 에러:", e); }
    var a={nameKo:"배민한",nameEn:"Ben",team:((CONFIG.teams||[])[0]||{}).name,role:(function(){var r=(CONFIG.roles||[])[0];return r?(typeof r==="string"?r:r.ko):"";})(),mobile:"010.6864.6438",email:"ben@dearcus.com",type:"양면"};
    return window.buildVectorDoc(a).then(function(doc){ doc.save("vector_test.pdf"); console.log("✅ 벡터 생성 성공 → vector_test.pdf 다운로드됨"); })
      .catch(function(e){ console.error("❌ 벡터 실패 원인:", e); window.__vectorError=e; });
  };
})();
